<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list</title>
    <link rel="stylesheet" href="/style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="container">
        <h1>Todo list</h1>
        <form class="todoForm">
            <input id="todoInput" class="todoInput" type="text" placeholder="What you going to do today?">
            <button id="todoAddButton" class="todoAddButton">Add</button>
        </form>
        <div>
            <svg id="spinnerSvg" class="spinner-svg hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <radialGradient id="a4" cx=".66" fx=".66" cy=".3125" fy=".3125" gradientTransform="scale(1.5)">
                    <stop offset="0" stop-color="#FFFFFF"></stop>
                    <stop offset=".3" stop-color="#FFFFFF" stop-opacity=".9"></stop>
                    <stop offset=".6" stop-color="#FFFFFF" stop-opacity=".6"></stop>
                    <stop offset=".8" stop-color="#FFFFFF" stop-opacity=".3"></stop>
                    <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"></stop>
                </radialGradient>
                <circle transform-origin="center" fill="none" stroke="url(#a4)" stroke-width="15" stroke-linecap="round"
                    stroke-dasharray="200 1000" stroke-dashoffset="0" cx="100" cy="100" r="70">
                    <animateTransform type="rotate" attributeName="transform" calcMode="spline" dur="2" values="360;0"
                        keyTimes="0;1" keySplines="0 0 1 1" repeatCount="indefinite"></animateTransform>
                </circle>
                <circle transform-origin="center" fill="none" opacity=".2" stroke="#FFFFFF" stroke-width="15"
                    stroke-linecap="round" cx="100" cy="100" r="70"></circle>
            </svg>
            <h2 id="noDataText" class="hidden">Нет данных</h2>
            <ul id="todoList" class="todoList">
                <li>Test task 1
                    <div class="buttonsContainer">
                        <button class="completedBtn">Completed</button> <button class="removeBtn">Remove</button>
                    </div>
                </li>
                <li>Test task 2 <button class="workingBtn">Working</button> <button class="removeBtn">Remove</button>
                </li>
                <li>Test task 3 <button class="removeBtn">Remove</button></li>
                <li>Test task 4 <button class="removeBtn">Remove</button></li>
                <li>Test task 5 <button class="removeBtn">Remove</button></li>
            </ul>
        </div>
    </div>
</body>

</html>
